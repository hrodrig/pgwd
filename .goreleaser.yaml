# GoReleaser config for pgwd
# https://goreleaser.com
# Release: merge develop → main, git tag v0.1.0, then make release
# Snapshot (no tag): make snapshot

version: 2

before:
  hooks:
    - sh -c 'gzip -c contrib/man/man1/pgwd.1 > contrib/man/man1/pgwd.1.gz'

builds:
  - id: pgwd
    main: ./cmd/pgwd
    binary: pgwd
    goos:
      - linux
      - darwin
      - windows
      - freebsd
      - openbsd
      - netbsd
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.Version=v{{ .Version }}
      - -X main.Commit={{ .ShortCommit }}
      - -X main.BuildDate={{ .Date }}

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Tag }}_{{ .Os }}_{{ .Arch }}"
    files:
      - src: contrib/man/man1/pgwd.1
        dst: share/man/man1/pgwd.1
      - src: LICENSE
        dst: share/doc/pgwd/LICENSE
      - src: contrib/openbsd/pgwd
        dst: share/openbsd/rc.d/pgwd
      - src: contrib/netbsd/rc.d/pgwd
        dst: share/netbsd/rc.d/pgwd
      - src: contrib/pgwd.conf.example
        dst: etc/pgwd/pgwd.conf.example

checksum:
  name_template: "checksums.txt"

nfpms:
  - id: default
    package_name: pgwd
    scripts:
      preremove: contrib/deb/prerm.sh
      postremove: contrib/deb/postrm.sh
    file_name_template: "{{ .ProjectName }}_{{ .Tag }}_{{ .Os }}_{{ .Arch }}"
    description: Postgres Watch Dog - monitor PostgreSQL connections and notify via Slack/Loki
    vendor: "Hermes Rodríguez"
    homepage: https://github.com/hrodrig/pgwd
    license: MIT
    formats:
      - deb
      - rpm
    builds:
      - pgwd
    contents:
      - src: contrib/man/man1/pgwd.1.gz
        dst: /usr/share/man/man1/
      # Config: install example as /etc/pgwd/pgwd.conf; user must edit (client, db.url, notifications).
      # config|noreplace: on upgrade, do not overwrite if user modified the file.
      - src: contrib/pgwd.conf.example
        dst: /etc/pgwd/pgwd.conf
        type: config|noreplace
      # systemd units: daemon, one-shot, timer. User enables with: systemctl enable --now pgwd
      - src: contrib/systemd/pgwd.service
        dst: /lib/systemd/system/pgwd.service
      - src: contrib/systemd/pgwd-once.service
        dst: /lib/systemd/system/pgwd-once.service
      - src: contrib/systemd/pgwd.timer
        dst: /lib/systemd/system/pgwd.timer

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"

release:
  github:
    owner: hrodrig
    name: pgwd

# Docker: multi-arch image to ghcr.io (same GITHUB_TOKEN). Requires buildx + qemu for local release.
dockers_v2:
  - dockerfile: Dockerfile.release
    ids:
      - pgwd
    images:
      - ghcr.io/hrodrig/pgwd
    tags:
      - "v{{ .Version }}"
      - "{{ if not .IsSnapshot }}latest{{ end }}"
    labels:
      org.opencontainers.image.title: "pgwd"
      org.opencontainers.image.description: "Postgres Watch Dog - monitor PostgreSQL connections and notify via Slack/Loki"
      org.opencontainers.image.source: "https://github.com/hrodrig/pgwd"
      org.opencontainers.image.version: "{{ .Version }}"

# Homebrew: publish cask to tap so users can "brew install hrodrig/pgwd/pgwd"
# Create repo https://github.com/hrodrig/homebrew-pgwd first. For CI, set HOMEBREW_TAP_TOKEN (PAT with repo scope).
homebrew_casks:
  - name: pgwd
    directory: Casks
    homepage: "https://github.com/hrodrig/pgwd"
    description: "Postgres Watch Dog - monitor PostgreSQL connections and notify via Slack/Loki"
    repository:
      owner: hrodrig
      name: homebrew-pgwd
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    url:
      verified: "github.com/hrodrig/pgwd/"
    manpages:
      - share/man/man1/pgwd.1
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/pgwd"]
          end
