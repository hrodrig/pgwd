# Postgres for pgwd e2e test (kind cluster).
# Same credentials as testing/compose.yaml: pgwd/pgwd/pgwd
---
apiVersion: v1
kind: Namespace
metadata:
  name: pgwd-e2e
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: pgwd-e2e
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: Always
          env:
            - name: POSTGRES_USER
              value: pgwd
            - name: POSTGRES_PASSWORD
              value: pgwd
            - name: POSTGRES_DB
              value: pgwd
          ports:
            - containerPort: 5432
          securityContext:
            allowPrivilegeEscalation: false
          resources:
            limits:
              memory: 1Gi
              cpu: "0.5"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "pgwd", "-d", "pgwd"]
            initialDelaySeconds: 5
            periodSeconds: 2
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "pgwd", "-d", "pgwd"]
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: pgwd-e2e
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
